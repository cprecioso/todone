name: Build and check code

on:
  workflow_dispatch:
    inputs:
      publish-preview: &publish-preview
        description: Publish a preview release to pkg.pr.new
        type: boolean
        default: false
  workflow_call:
    inputs:
      publish-preview: *publish-preview

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4

      - uses: actions/setup-node@v6
        with:
          cache: "yarn"
      - run: yarn install --immutable

      - name: Build and check
        run: yarn nx run-many -t lint,build,check,build-docs,test

      - name: Pack packages
        run: |
          folder=$(pwd)/out
          mkdir -p $folder
          yarn workspaces foreach --all --no-private pack --out $folder/%s-%v.tgz

      - uses: actions/upload-artifact@v7
        with:
          name: packages
          path: ./out/*

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

      - name: Publish to pkg.pr.new
        if: ${{ inputs.publish-preview }}
        run: yarn dlx pkg-pr-new publish --yarn $(yarn workspaces list --no-private --json | jq -r '.location')
